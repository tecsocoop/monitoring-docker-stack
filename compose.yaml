services:

#### GRAFANA
  grafana:
    image: grafana/grafana:12.3.3
    container_name: grafana
    restart: unless-stopped
    env_file: .env
    ports:
      - '3000:3000'
    volumes:
      - './grafana/provisioning:/etc/grafana/provisioning'
      - './grafana/dashboards:/etc/grafana/dashboards'
      - './grafana/grafana.ini:/etc/grafana/grafana.ini'
      - 'grafana_data:/var/lib/grafana'
    networks:
      - monitoring

#### GRAFANA IMAGE RENDERER
# Para habilitar screenshots en alertas, descomentar este servicio y las
# secciones [unified_alerting.screenshots] y [rendering] en grafana/grafana.ini
#  grafana-image-renderer:
#    image: grafana/grafana-image-renderer:latest
#    container_name: grafana-image-renderer
#    restart: unless-stopped
#    environment:
#      ENABLE_METRICS: "true"
#      HTTP_PORT: 8081
#    networks:
#      - monitoring

#### LOKI
  loki:
    image: grafana/loki:3.6.5
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - './loki/local-config.yaml:/etc/loki/local-config.yaml'
      - 'loki_data:/loki'
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

#### PROMETHEUS
  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus/
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring

#### ALERTMANAGER
  alertmanager:
    image: prom/alertmanager:v0.31.1
    container_name: alertmanager
    restart: unless-stopped
    volumes:
      - ./prometheus/alertmanager/:/etc/alertmanager/
    networks:
      - monitoring

networks:
  monitoring:
    name: monitoring
    driver: bridge

volumes:
  grafana_data:
  prometheus_data:
  loki_data:

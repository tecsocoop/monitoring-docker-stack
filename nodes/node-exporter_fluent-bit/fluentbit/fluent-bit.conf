[SERVICE]
    Daemon       Off
    Flush        1
    Log_Level    info
    Parsers_File /fluent-bit/etc/conf/parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020
    Health_Check On

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    Tag               docker.*
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    Refresh_Interval  5
    DB                /var/log/fluent-bit/docker.db

[FILTER]
    Name         grep
    Match        docker.*
    Exclude      container_name fluent-bit

[OUTPUT]
    Name         loki
    Match        docker.*
    Host         loki
    Port         3100
    Labels       agent=fluent-bit, job=docker
    Line_Format  json
